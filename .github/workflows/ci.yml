name: CI

on:
  push:
    branches: [main]
  pull_request:

# The build is fully from-scratch: fetch pinned Moscow ML, native build,
# Emscripten runtime, 32-bit bytecode rebuild under the wasm runtime, asset
# packing, then all Node and Playwright test suites.

env:
  EMSCRIPTEN_VERSION: 6.0.1

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          git checkout 1518bec61a0430aa5cfda576f5ce3191004c84d9 # tag 6.0.1
          ./emsdk install "$EMSCRIPTEN_VERSION"
          ./emsdk activate "$EMSCRIPTEN_VERSION"

      # emsdk_env.sh puts the emsdk root on PATH, which contains a directory
      # named `node`; GNU make's posix_spawn stops at that entry with EACCES
      # instead of continuing the PATH search. Scope the emsdk env to the one
      # stage that needs emcc, and run the node-based stages with a clean env.
      - name: Build native + wasm runtime
        run: |
          make native
          (source emsdk/emsdk_env.sh && make -C wasm)

      - name: Rebuild bytecode (32-bit) and pack assets
        run: |
          scripts/build-bytecode-32.sh
          node scripts/pack-assets.mjs

      - name: Install Playwright
        run: |
          npm install -g playwright@1.48.2
          playwright install --with-deps chromium

      - name: Test
        run: make test

      - name: Assemble Pages site (demo)
        run: |
          mkdir -p _site
          cp -r web dist js examples _site/
          printf '<meta http-equiv="refresh" content="0; url=web/">' > _site/index.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deployment
